<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Code Shakti Wallet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    color: #00e5ff;
    font-size: 22px;
    font-weight: bold;
}

.rotate {
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 28px;
    animation: spin 3s linear infinite;
    color: #00e5ff;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.card {
    margin: 10px;
    padding: 12px;
    background: #151f35;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    border-left: 4px solid #00e5ff;
}

.userbox {
    margin: 15px;
    padding: 15px;
    background: #121a2b;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="rotate">𖣘</div>

<div class="header">💎 CODE SHAKTI WALLET</div>

<div class="userbox" id="userBox">Loading user...</div>

<h3 style="text-align:center;">🏆 LIVE LEADERBOARD</h3>
<div id="board"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API = "http://localhost:3000";

// ================== LOGIN ==================
async function login() {
    let res = await fetch(`${API}/auth`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            initData: tg.initData,
            botToken: "YOUR_BOT_TOKEN"
        })
    });

    let data = await res.json();

    if (data.ok) {
        window.user = data.user;

        document.getElementById("userBox").innerHTML = `
            👤 Name: <b>${data.user.name}</b><br>
            💰 Balance: ₹${data.user.balance}
        `;
    } else {
        document.getElementById("userBox").innerHTML = "❌ Auth Failed";
    }
}

// ================== LEADERBOARD ==================
async function loadBoard() {
    let res = await fetch(`${API}/leaderboard`);
    let data = await res.json();

    let html = "";

    data.forEach((u, i) => {
        html += `
        <div class="card">
            <span>${i==0?"🥇":i==1?"🥈":i==2?"🥉":"🔥"} ${u.name}</span>
            <span>₹${u.balance}</span>
        </div>
        `;
    });

    document.getElementById("board").innerHTML = html;
}

// LIVE REFRESH
setInterval(loadBoard, 3000);

login();
loadBoard();
</script>

</body>
</html>
